# 把仪表盘快照发布到 GitHub Pages（仓库需为 Public，或有付费计划）。
# 一次性启用：仓库 Settings → Pages → Source 选 "GitHub Actions"。
# 之后每次 push 本工作流自动把 web/public/snapshot.html 发布为站点首页。
name: publish-dashboard

# 注意：在启用 Pages（Settings → Pages → Source: GitHub Actions，且仓库为
# Public 或有付费计划）之前保持纯手动触发，避免每次合并都产生必然失败的检查。
# 启用 Pages 后，把下面注释的 push 触发恢复即可自动发布：
# on:
#   push:
#     branches: [main]
#     paths: ["web/public/snapshot.html", ".github/workflows/pages.yml"]
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p dist
          cp web/public/snapshot.html dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
